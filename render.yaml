services:
  - type: web
    name: eclat-nail-atelier
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: CLIENT_BOT_TOKEN
        sync: false
      - key: OWNER_CHAT_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: eclat-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
